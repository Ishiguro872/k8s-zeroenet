apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - httproute.yaml

configMapGenerator:
  - name: homepage
    namespace: homepage
    behavior: replace
    files:
      - config/custom.js
      - config/custom.css
      - config/bookmarks.yaml
      - config/docker.yaml
      - config/kubernetes.yaml
      - config/services.yaml
      - config/settings.yaml
      - config/widgets.yaml

patches: []
  # - path: deployment-patch.yaml